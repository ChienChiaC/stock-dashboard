name: Update Dashboard

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'URL to download index.html from'
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download new index.html
        run: curl -L -o index.html "${{ github.event.inputs.file_url }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Update dashboard [auto]"
          git push
