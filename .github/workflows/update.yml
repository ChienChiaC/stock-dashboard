name: Update Dashboard

on:
  workflow_dispatch:
    inputs:
      content:
        description: 'Base64 encoded index.html content'
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write new index.html
        run: echo "${{ github.event.inputs.content }}" | base64 -d > index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Update dashboard [auto]"
          git push
